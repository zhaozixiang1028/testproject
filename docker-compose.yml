services:
  mysql:
    image: mysql:8.4
    container_name: testproject-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testproject
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend
    container_name: testproject-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/testproject?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: testproject-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
