server:
  port: 8080

spring:
  application:
    name: dailywork-backend
  datasource:
    url: jdbc:mysql://localhost:3306/testproject?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: MjY4OTdhYzgxN2M2ZTRiMzQ5ZGE4NjE5MWIwMWQ4NzNhOTVhMmYzNTczMWY1YjYxZjA4NTRkMDQxYjM5Y2IyNQ==
    access-token-expire-seconds: 7200
    refresh-token-expire-seconds: 604800
  ai:
    base-url: ${APP_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:qwen-math-turbo}
